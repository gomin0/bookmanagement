openapi: 3.0.0
info:
  title: 온라인 도서 관리 시스템 API
  description: 도서 등록, 조회, 검색, 태그 필터링, 대출 관리 REST API
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: 로컬 서버

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    BookRequest:
      type: object
      properties:
        isbn:
          type: string
          description: 도서 ISBN (10~13자리)
        title:
          type: string
          description: 도서 제목
        author:
          type: string
          description: 저자
        tags:
          type: array
          items:
            type: string
          description: 도서 태그 리스트

    BookResponse:
      type: object
      properties:
        id:
          type: integer
          description: 도서 ID
        isbn:
          type: string
          description: 도서 ISBN
        title:
          type: string
          description: 도서 제목
        author:
          type: string
          description: 저자
        available:
          type: boolean
          description: 대출 가능 여부
        tags:
          type: array
          items:
            type: string
          description: 도서 태그 리스트

    UserRequest:
      type: object
      properties:
        name:
          type: string
          description: 사용자 이름
        email:
          type: string
          format: email
          description: 사용자 이메일
        password:
          type: string
          description: 사용자 비밀번호 (암호화되어 저장됨)

    UserResponse:
      type: object
      properties:
        id:
          type: integer
          description: 사용자 ID
        name:
          type: string
          description: 사용자 이름
        email:
          type: string
          description: 사용자 이메일

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: 로그인 이메일
        password:
          type: string
          description: 로그인 비밀번호

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT 인증 토큰

    LoanRequest:
      type: object
      properties:
        userId:
          type: integer
          description: 대출할 사용자 ID
        bookId:
          type: integer
          description: 대출할 도서 ID

    LoanResponse:
      type: object
      properties:
        loanId:
          type: integer
          description: 대출 ID
        userId:
          type: integer
          description: 대출한 사용자 ID
        bookId:
          type: integer
          description: 대출된 도서 ID
        loanDate:
          type: string
          format: date
          description: 대출 날짜
        returnDate:
          type: string
          format: date
          description: 반납 기한

    LoanStatusResponse:
      type: object
      properties:
        available:
          type: boolean
          description: 대출 가능 여부
        message:
          type: string
          description: 대출 가능 상태 메시지

paths:
  /api/users:
    get:
      summary: 모든 사용자 조회
      security:
        - BearerAuth: []
      responses:
        200:
          description: 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserResponse"
        401:
          description: 인증 필요
        403:
          description: 접근 권한 없음

    post:
      summary: 새로운 사용자 등록
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRequest"
      responses:
        201:
          description: 사용자 등록 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        400:
          description: 잘못된 요청
        409:
          description: 중복된 이메일

  /api/users/login:
    post:
      summary: 로그인 (JWT 발급)
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        200:
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        401:
          description: 로그인 실패 (이메일 또는 비밀번호 오류)

  /api/books:
    get:
      summary: 모든 도서 조회
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
          description: 페이지 번호 (기본값: 0)
        - name: size
          in: query
          schema:
            type: integer
          description: 페이지 크기 (기본값: 10)
      responses:
        200:
          description: 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookResponse"
        401:
          description: 인증 필요

    post:
      summary: 새로운 도서 등록
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookRequest"
      responses:
        201:
          description: 도서 등록 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"
        409:
          description: 중복된 ISBN

  /api/books/{id}:
    get:
      summary: 특정 도서 조회
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"
        404:
          description: 도서 없음

  /api/loans:
    post:
      summary: 도서 대출
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoanRequest"
      responses:
        201:
          description: 대출 성공
        400:
          description: 잘못된 요청
        409:
          description: 도서가 이미 대출됨

  /api/loans/{bookId}:
    get:
      summary: 특정 도서의 대출 상태 확인
      security:
        - BearerAuth: []
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: 대출 상태 확인 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoanStatusResponse"

  /api/loans/{bookId}/return:
    post:
      summary: 도서 반납
      security:
        - BearerAuth: []
      responses:
        200:
          description: 반납 성공
        400:
          description: 잘못된 요청